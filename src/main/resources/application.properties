spring.application.name=covoiturage
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/covoiturage

spring.datasource.username=root
spring.datasource.password=root


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

//logging.file.name=logs/covoiturage.log
logging.level.root=INFO
logging.file.name=C:/temp/covoiturage.log
logging.level.org.example.covoiturage=DEBUG